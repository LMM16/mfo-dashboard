name: Atualizar Dashboard MFO

on:
  # Roda toda segunda-feira às 07:00 (horário de Brasília = 10:00 UTC)
  schedule:
    - cron: "0 10 * * 1"

  # Também roda quando você faz push (para testar)
  push:
    branches: [main]

  # Permite rodar manualmente pela interface do GitHub
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # necessário para o push automático

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install pandas requests

      - name: Executar ETL e gerar dashboard
        run: python src/build_dashboard.py

      - name: Commitar e publicar
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "🔄 Dashboard atualizado $(date +'%d/%m/%Y %H:%M')"
          git push
